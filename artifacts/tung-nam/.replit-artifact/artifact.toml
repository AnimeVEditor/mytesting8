kind = "web"
previewPath = "/"
title = "Tung Nam Eating House"
version = "1.0.0"
id = "artifacts/tung-nam"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20458

[services.development]
run = "pnpm --filter @workspace/tung-nam run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tung-nam", "run", "build" ]
serve = "static"
publicDir = "artifacts/tung-nam/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20458"
BASE_PATH = "/"
